<!-- Claude-style Sidebar -->
<style>
    .sidebar {
        position: fixed; left: 0; top: 0; height: 100vh; width: 52px;
        background: #171717; border-right: 1px solid #2a2a2a;
        z-index: 200; transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden; display: flex; flex-direction: column;
    }
    .sidebar:hover, .sidebar.pinned { width: 250px; }

    .sidebar-top {
        padding: 12px; display: flex; align-items: center; gap: 10px;
        border-bottom: 1px solid #2a2a2a; min-height: 52px;
    }
    .sidebar-logo { width: 28px; height: 28px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .sidebar-brand { font-size: 14px; font-weight: 600; color: #f5f5f5; white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
    .sidebar:hover .sidebar-brand, .sidebar.pinned .sidebar-brand { opacity: 1; }

    .sidebar-pin {
        position: absolute; right: 10px; top: 15px; cursor: pointer;
        color: #666; font-size: 14px; opacity: 0; transition: opacity 0.2s;
        background: none; border: none; padding: 4px;
    }
    .sidebar:hover .sidebar-pin, .sidebar.pinned .sidebar-pin { opacity: 1; }
    .sidebar.pinned .sidebar-pin { color: #3b82f6; }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 6px; }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .nav-section { padding: 4px 0; }
    .nav-label {
        font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
        color: #555; padding: 8px 12px 4px; white-space: nowrap;
        opacity: 0; transition: opacity 0.2s;
    }
    .sidebar:hover .nav-label, .sidebar.pinned .nav-label { opacity: 1; }

    .nav-item {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 12px; margin: 1px 0; border-radius: 8px;
        color: #999; text-decoration: none; font-size: 13px;
        white-space: nowrap; transition: all 0.15s; cursor: pointer;
    }
    .nav-item:hover { background: #222; color: #e5e5e5; }
    .nav-item.active { background: #1e3a5f; color: #60a5fa; }
    .nav-icon { font-size: 16px; min-width: 20px; text-align: center; flex-shrink: 0; }
    .nav-text { opacity: 0; transition: opacity 0.2s; font-weight: 400; }
    .sidebar:hover .nav-text, .sidebar.pinned .nav-text { opacity: 1; }

    .nav-divider { height: 1px; background: #2a2a2a; margin: 6px 12px; }

    .sidebar-footer {
        padding: 10px 12px; border-top: 1px solid #2a2a2a;
        display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
        width: 28px; height: 28px; border-radius: 50%; background: #333;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; color: #999; flex-shrink: 0; font-weight: 600;
    }
    .user-info-box { opacity: 0; transition: opacity 0.2s; white-space: nowrap; overflow: hidden; }
    .sidebar:hover .user-info-box, .sidebar.pinned .user-info-box { opacity: 1; }
    .user-email { font-size: 12px; color: #999; }
    .user-logout { font-size: 11px; color: #ef4444; text-decoration: none; }
    .user-logout:hover { color: #f87171; }

    /* Main content offset */
    .main-content { margin-left: 52px; transition: margin-left 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar.pinned ~ .main-content { margin-left: 250px; }

    @media (max-width: 768px) {
        .sidebar { width: 0; border: none; }
        .sidebar:hover, .sidebar.pinned { width: 250px; border-right: 1px solid #2a2a2a; }
        .main-content { margin-left: 0 !important; }
        .mobile-toggle { display: block !important; }
    }

    .mobile-toggle {
        display: none; position: fixed; top: 12px; left: 12px; z-index: 201;
        background: #171717; border: 1px solid #2a2a2a; border-radius: 8px;
        padding: 8px 12px; color: #999; font-size: 18px; cursor: pointer;
    }
</style>

<div class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('pinned')">&#9776;</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="sidebar-logo">K</div>
        <span class="sidebar-brand">K8s Healing Agent</span>
        <button class="sidebar-pin" onclick="togglePin()" title="Pin sidebar">&#128204;</button>
    </div>

    <div class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-label">Monitor</div>
            <a href="/" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">&#128202;</span><span class="nav-text">Dashboard</span>
            </a>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <div class="nav-label">Cost</div>
            <a href="/cost" class="nav-item {% if active == 'cost' %}active{% endif %}">
                <span class="nav-icon">&#128176;</span><span class="nav-text">Cost Optimizer</span>
            </a>
            <a href="/costs" class="nav-item {% if active == 'costs' %}active{% endif %}">
                <span class="nav-icon">&#128200;</span><span class="nav-text">Cost Visibility</span>
            </a>
            <a href="/nodes" class="nav-item {% if active == 'nodes' %}active{% endif %}">
                <span class="nav-icon">&#128421;</span><span class="nav-text">Node Optimizer</span>
            </a>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <div class="nav-label">Optimize</div>
            <a href="/optimizer" class="nav-item {% if active == 'optimizer' %}active{% endif %}">
                <span class="nav-icon">&#9889;</span><span class="nav-text">Live Optimizer</span>
            </a>
            <a href="/spot" class="nav-item {% if active == 'spot' %}active{% endif %}">
                <span class="nav-icon">&#128161;</span><span class="nav-text">Spot Manager</span>
            </a>
            <a href="/binpack" class="nav-item {% if active == 'binpack' %}active{% endif %}">
                <span class="nav-icon">&#128230;</span><span class="nav-text">Bin Packing</span>
            </a>
            <a href="/gpu" class="nav-item {% if active == 'gpu' %}active{% endif %}">
                <span class="nav-icon">&#127918;</span><span class="nav-text">GPU Optimizer</span>
            </a>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <div class="nav-label">Intelligence</div>
            <a href="/security" class="nav-item {% if active == 'security' %}active{% endif %}">
                <span class="nav-icon">&#128737;</span><span class="nav-text">Security Scanner</span>
            </a>
            <a href="/predict" class="nav-item {% if active == 'predict' %}active{% endif %}">
                <span class="nav-icon">&#128302;</span><span class="nav-text">AI Predictions</span>
            </a>
        </div>
    </div>

    <div class="sidebar-footer">
        {% if user %}
        <div class="user-avatar">{{ user.email[0]|upper }}</div>
        <div class="user-info-box">
            <div class="user-email">{{ user.email }}</div>
            <a href="/auth/logout" class="user-logout">Sign out</a>
        </div>
        {% else %}
        <div class="user-avatar">?</div>
        {% endif %}
    </div>
</div>

<script>
function togglePin() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('pinned');
    localStorage.setItem('sidebarPinned', sidebar.classList.contains('pinned'));
}
// Restore pin state
if (localStorage.getItem('sidebarPinned') === 'true') {
    document.getElementById('sidebar').classList.add('pinned');
}
</script>
