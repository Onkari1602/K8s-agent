<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - K8s Healing Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e1e8ed; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: #1a2332; border: 1px solid #2d3748; border-radius: 16px; padding: 40px; width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo { font-size: 48px; margin-bottom: 10px; }
        .title { font-size: 24px; color: #63b3ed; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #a0aec0; margin-bottom: 30px; }
        .login-btn { display: inline-block; background: #3182ce; color: white; text-decoration: none; padding: 14px 40px; border-radius: 8px; font-size: 16px; font-weight: 600; transition: all 0.2s; width: 100%; }
        .login-btn:hover { background: #2b6cb0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(49,130,206,0.4); }
        .features { margin-top: 30px; text-align: left; }
        .feature { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; color: #a0aec0; }
        .feature-dot { width: 6px; height: 6px; border-radius: 50%; background: #48bb78; flex-shrink: 0; }
        .footer { margin-top: 25px; font-size: 11px; color: #4a5568; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">&#x1F6E1;</div>
        <div class="title">K8s Healing Agent</div>
        <div class="subtitle">AI-Powered Cluster Monitoring & Auto-Remediation</div>
        <a href="{{ login_url }}" class="login-btn">Sign in with AWS Cognito</a>
        <div class="features">
            <div class="feature"><span class="feature-dot"></span> Real-time pod health monitoring</div>
            <div class="feature"><span class="feature-dot"></span> AI-powered root cause analysis</div>
            <div class="feature"><span class="feature-dot"></span> One-click issue resolution</div>
            <div class="feature"><span class="feature-dot"></span> Auto-generated healing reports</div>
        </div>
        <div class="footer">Secured with Amazon Cognito</div>
    </div>
</body>
</html>
