<!-- Collapsible Sidebar -->
<style>
    .sidebar { position: fixed; left: -240px; top: 0; height: 100vh; width: 240px; background: #1a2332; border-right: 1px solid #2d3748; z-index: 200; transition: left 0.3s ease; overflow: hidden; display: flex; flex-direction: column; }
    .sidebar.open { left: 0; }
    .sidebar-toggle { padding: 18px 20px; cursor: pointer; color: #63b3ed; font-size: 20px; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 12px; }
    .sidebar-toggle:hover { background: #2d3748; }
    .sidebar-toggle .label { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .hamburger { position: fixed; top: 15px; left: 15px; z-index: 201; cursor: pointer; background: #1a2332; border: 1px solid #2d3748; border-radius: 8px; padding: 8px 12px; color: #63b3ed; font-size: 20px; display: flex; align-items: center; gap: 10px; }
    .hamburger:hover { background: #2d3748; }
    .hamburger .title { font-size: 14px; font-weight: 600; color: #63b3ed; }
    .sidebar.open ~ .hamburger { display: none; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #a0aec0; text-decoration: none; font-size: 13px; white-space: nowrap; transition: all 0.2s; border-left: 3px solid transparent; }
    .sidebar-item:hover { background: #2d3748; color: #e1e8ed; }
    .sidebar-item.active { color: #63b3ed; border-left-color: #63b3ed; background: #2d374850; }
    .sidebar-item .icon { font-size: 18px; min-width: 22px; text-align: center; }
    .sidebar-item .text { white-space: nowrap; }
    .sidebar-divider { height: 1px; background: #2d3748; margin: 8px 15px; }
    .sidebar-footer { padding: 12px 15px; border-top: 1px solid #2d3748; }
    .sidebar-footer .user { font-size: 11px; color: #a0aec0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-footer .logout { display: flex; align-items: center; gap: 8px; color: #fc8181; text-decoration: none; font-size: 12px; padding: 6px 5px; }

    /* Main content takes full width */
    .main-content { margin-left: 0; }

    /* Overlay on mobile */
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 199; }
    .sidebar.open ~ .sidebar-overlay { display: block; }

    @media (max-width: 768px) {
        .sidebar.open { width: 220px; }
    }
</style>

<div class="hamburger" id="hamburger" onclick="toggleSidebar()"><span>&#9776;</span><span class="title">K8s Healing Agent</span></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-toggle" onclick="toggleSidebar()">
        <span>&#9776;</span>
        <span class="label">K8s Healing Agent</span>
    </div>
    <div class="sidebar-nav">
        <a href="/" class="sidebar-item {% if active == 'dashboard' %}active{% endif %}">
            <span class="icon">&#x1F4CA;</span><span class="text">Dashboard</span>
        </a>
        <div class="sidebar-divider"></div>
        <a href="/cost" class="sidebar-item {% if active == 'cost' %}active{% endif %}">
            <span class="icon">&#x1F4B0;</span><span class="text">Cost Optimizer</span>
        </a>
        <a href="/costs" class="sidebar-item {% if active == 'costs' %}active{% endif %}">
            <span class="icon">&#x1F4C8;</span><span class="text">Cost Visibility</span>
        </a>
        <a href="/nodes" class="sidebar-item {% if active == 'nodes' %}active{% endif %}">
            <span class="icon">&#x1F5A5;</span><span class="text">Node Optimizer</span>
        </a>
        <div class="sidebar-divider"></div>
        <a href="/optimizer" class="sidebar-item {% if active == 'optimizer' %}active{% endif %}">
            <span class="icon">&#x26A1;</span><span class="text">Live Optimizer</span>
        </a>
        <a href="/spot" class="sidebar-item {% if active == 'spot' %}active{% endif %}">
            <span class="icon">&#x1F4A1;</span><span class="text">Spot Manager</span>
        </a>
        <a href="/binpack" class="sidebar-item {% if active == 'binpack' %}active{% endif %}">
            <span class="icon">&#x1F4E6;</span><span class="text">Bin Packing</span>
        </a>
        <div class="sidebar-divider"></div>
        <a href="/security" class="sidebar-item {% if active == 'security' %}active{% endif %}">
            <span class="icon">&#x1F6E1;</span><span class="text">Security Scanner</span>
        </a>
        <a href="/predict" class="sidebar-item {% if active == 'predict' %}active{% endif %}">
            <span class="icon">&#x1F52E;</span><span class="text">AI Predictions</span>
        </a>
        <a href="/gpu" class="sidebar-item {% if active == 'gpu' %}active{% endif %}">
            <span class="icon">&#x1F3AE;</span><span class="text">GPU Optimizer</span>
        </a>
    </div>
    <div class="sidebar-footer">
        {% if user %}
        <div class="user">{{ user.email }}</div>
        <a href="/auth/logout" class="logout">
            <span class="icon">&#x1F6AA;</span><span class="text">Logout</span>
        </a>
        {% endif %}
    </div>
</div>
<div class="sidebar-overlay" onclick="closeSidebar()"></div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const hamburger = document.getElementById('hamburger');
    sidebar.classList.toggle('open');
    hamburger.style.display = sidebar.classList.contains('open') ? 'none' : 'block';
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('hamburger').style.display = 'block';
}
// Close sidebar on navigation
document.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', closeSidebar);
});
</script>
